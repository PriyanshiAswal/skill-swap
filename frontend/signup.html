<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Skill Swap</title>
  <!-- Add ./ to ensure it looks in the same folder -->
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Basic styling for the message box */
    #messageBox {
      padding: 10px;
      margin-top: 15px;
      border-radius: 5px;
      display: none; /* Hidden by default */
      font-weight: bold;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
      text-align: center;
    }
    .success {
      background-color: #e6ffed; /* Light green */
      color: #2e7d32; /* Dark green (matching header) */
      border: 1px solid #2e7d32;
    }
    .error {
      background-color: #ffe6e6; /* Light red */
      color: #D32F2F; /* Dark red */
      border: 1px solid #D32F2F;
    }
    form input, form button {
        margin-bottom: 10px;
        padding: 8px;
        width: 100%;
        box-sizing: border-box;
    }
    form {
        max-width: 300px;
        margin: 20px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: white;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <header>
    <h1>Skill Swap</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="signup.html">Sign Up</a>
    </nav>
  </header>
    
  <h1>Create Account</h1>
  <form id="signupForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>

  <!-- IMPORTANT: This div is where the JavaScript (script.js) will display the success/error messages. -->
  <div id="messageBox"></div>

  <!-- CRITICAL: Ensure this path matches the exact filename of your script.js file on disk. -->
  <script src="./script.js"></script>
</body>
</html>
